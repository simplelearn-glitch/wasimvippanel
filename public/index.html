<!DOCTYPE html>
<html>
<head>
  <title>VIP Panel</title>
</head>
<body style="background:#0a0f2c;color:white;text-align:center;padding:50px;">

<h1>VIP Panel</h1>

<button onclick="generate()">Generate Key</button>

<p id="result"></p>

<script>
function generate() {
  fetch("/generate", { method: "POST" })
    .then(res => res.json())
    .then(data => {
      document.getElementById("result").innerText = data.key;
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIMVIPPANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-gray-200 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-gradient-to-r from-indigo-700 to-purple-800 p-6 rounded-2xl shadow-2xl mb-6 border-b-4 border-indigo-500 text-center">
            <h1 class="text-2xl font-black text-white tracking-widest uppercase">🚀 WASIMVIPPANEL</h1>
        </div>

        <div class="bg-gray-900/50 p-6 rounded-3xl border border-gray-800 shadow-xl">
            <div class="mb-4">
                <label class="text-[10px] font-bold text-gray-500 uppercase">Game</label>
                <select id="game" class="w-full bg-[#161b26] border border-gray-800 p-3 rounded-xl mt-1 outline-none text-sm">
                    <option>PUBG Mobile</option><option>BGMI</option><option>Free Fire</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="text-[10px] font-bold text-gray-500 uppercase">Duration</label>
                <select id="duration" class="w-full bg-[#161b26] border border-gray-800 p-3 rounded-xl mt-1 outline-none text-sm">
                    <option>2 Hours</option><option>5 Hours</option><option>6 Hours</option>
                    <option>1 Day</option><option>7 Days</option><option>30 Days</option><option>60 Days</option>
                </select>
            </div>

            <button onclick="generateKey()" id="genBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all uppercase text-sm tracking-widest">
                Generate Key
            </button>

            <div id="resultBox" class="mt-6 p-4 rounded-xl bg-indigo-500/10 border border-indigo-500/30 hidden text-center">
                <p id="keyDisplay" class="font-mono font-bold text-indigo-400 text-lg">---</p>
                <p id="expiryDisplay" class="text-[10px] text-gray-500 mt-2 font-medium"></p>
            </div>
        </div>
    </div>

    <script>
        async function generateKey() {
            const btn = document.getElementById('genBtn');
            btn.innerText = "WAIT...";
            const res = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ game: document.getElementById('game').value, plan: document.getElementById('duration').value })
            });
            const data = await response = await res.json();
            document.getElementById('keyDisplay').innerText = data.key;
            document.getElementById('expiryDisplay').innerText = "EXPIRES: " + new Date(data.expiresAt).toLocaleString();
            document.getElementById('resultBox').classList.remove('hidden');
            btn.innerText = "Generate Key";
        }
    </script>
</body>
</html>

<div id="server-status-box" style="padding: 15px; border-radius: 8px; background: #1a1a1a; color: white; display: inline-block;">
    Server Status: <span id="status-indicator">Checking...</span>
    <br>
    <small id="last-ping"></small>
</div>

<script>
    async function checkServerStatus() {
        const statusText = document.getElementById('status-indicator');
        const pingText = document.getElementById('last-ping');
        
        try {
            const start = Date.now();
            // Hum /verify par ek empty request bhej kar check kar rahe hain
            const response = await fetch('https://wasimvippanel.onrender.com/verify');
            const end = Date.now();
            
            if (response.ok) {
                statusText.innerHTML = "🟢 ONLINE";
                statusText.style.color = "#00ff00";
                pingText.innerHTML = "Ping: " + (end - start) + "ms";
            } else {
                throw new Error();
            }
        } catch (error) {
            statusText.innerHTML = "🔴 OFFLINE / SLEEPING";
            statusText.style.color = "#ff0000";
            pingText.innerHTML = "Server is not responding";
        }
    }

    // Har 30 second mein auto-check karega
    setInterval(checkServerStatus, 30000);
    checkServerStatus();
</script>
